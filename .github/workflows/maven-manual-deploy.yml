# Reusable Manual Deploy Workflow
#
# Deploys Maven artifacts to Nexus via workflow_dispatch.
# Designed for repos with fixed release versions (no SNAPSHOT cycle)
# where deploy should only happen on demand.
#
# Usage (single module):
# ```yaml
# name: Deploy
# on:
#   workflow_dispatch:
# jobs:
#   deploy:
#     uses: codice/release-pipelines/.github/workflows/maven-manual-deploy.yml@main
#     secrets:
#       nexus_username: ${{ secrets.NEXUS_USERNAME }}
#       nexus_password: ${{ secrets.NEXUS_PASSWORD }}
# ```
#
# Usage (multi-module with per-module targeting):
# ```yaml
# name: Deploy
# on:
#   workflow_dispatch:
#     inputs:
#       modules:
#         description: 'Modules to deploy (comma-separated). Leave blank for all.'
#         required: false
# jobs:
#   deploy:
#     uses: codice/release-pipelines/.github/workflows/maven-manual-deploy.yml@main
#     with:
#       modules: ${{ inputs.modules }}
#     secrets:
#       nexus_username: ${{ secrets.NEXUS_USERNAME }}
#       nexus_password: ${{ secrets.NEXUS_PASSWORD }}
# ```

name: Maven Manual Deploy (Reusable)

on:
  workflow_call:
    inputs:
      jdk_version:
        description: 'JDK version'
        required: false
        type: string
        default: '17'
      modules:
        description: 'Modules to deploy (comma-separated). Leave blank for all.'
        required: false
        type: string
        default: ''
      maven_args:
        description: 'Additional Maven arguments'
        required: false
        type: string
        default: ''
    secrets:
      nexus_username:
        description: 'Nexus username'
        required: true
      nexus_password:
        description: 'Nexus password'
        required: true

env:
  MAVEN_OPTS: '-Xmx4G -Xms1G -Djava.security.egd=file:/dev/./urandom --add-opens java.base/java.lang.reflect=ALL-UNNAMED --add-opens java.base/java.lang=ALL-UNNAMED --add-opens java.base/java.io=ALL-UNNAMED --add-opens java.base/java.util=ALL-UNNAMED --add-opens java.base/sun.reflect.annotation=ALL-UNNAMED -Djavax.xml.accessExternalDTD=all -Djavax.xml.accessExternalSchema=all'
  MAVEN_CLI_OPTS: '-B -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn'
  NEXUS_URL: https://repo.codice.org/repository

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ inputs.jdk_version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.jdk_version }}
          distribution: 'temurin'
          cache: maven

      - name: Create Maven Settings
        env:
          NEXUS_USERNAME: ${{ secrets.nexus_username }}
          NEXUS_PASSWORD: ${{ secrets.nexus_password }}
        run: |
          mkdir -p ~/.m2
          printf '<settings>\n  <servers>\n    <server>\n      <id>releases</id>\n      <username>%s</username>\n      <password>%s</password>\n    </server>\n    <server>\n      <id>snapshots</id>\n      <username>%s</username>\n      <password>%s</password>\n    </server>\n  </servers>\n</settings>\n' "$NEXUS_USERNAME" "$NEXUS_PASSWORD" "$NEXUS_USERNAME" "$NEXUS_PASSWORD" > ~/.m2/settings.xml

      - name: Deploy selected modules
        if: inputs.modules != ''
        run: |
          IFS=',' read -ra MODULES <<< "${{ inputs.modules }}"
          for module in "${MODULES[@]}"; do
            module=$(echo "$module" | xargs)
            echo "::group::Deploying $module"
            mvn deploy $MAVEN_CLI_OPTS \
              -pl "$module" \
              -DskipTests=true \
              -DretryFailedDeploymentCount=10 \
              -Dreleases.repository.url="${NEXUS_URL}/maven-releases/" \
              -Dsnapshots.repository.url="${NEXUS_URL}/maven-snapshots/" \
              ${{ inputs.maven_args }}
            echo "::endgroup::"
          done

      - name: Deploy all modules
        if: inputs.modules == ''
        run: |
          mvn deploy $MAVEN_CLI_OPTS \
            -DskipTests=true \
            -DretryFailedDeploymentCount=10 \
            -Dreleases.repository.url="${NEXUS_URL}/maven-releases/" \
            -Dsnapshots.repository.url="${NEXUS_URL}/maven-snapshots/" \
            ${{ inputs.maven_args }}
