# Re-deploy from Existing Tag
#
# Use this when:
# - Release pipeline failed after tagging but during deploy
# - Artifacts were lost and you need to republish
# - You need to push to a different repository
#
# This does NOT:
# - Bump versions
# - Create tags
# - Push to git
# - Create GitHub releases

name: Re-deploy Tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (e.g., ddf-2.29.0)'
        required: true
        type: string
      jdkVersion:
        description: 'JDK version'
        required: true
        default: '11'
        type: choice
        options:
          - '8'
          - '11'
          - '17'
      testRun:
        description: 'Test run (no actual deployment)'
        required: false
        default: false
        type: boolean

env:
  NEXUS_URL: https://repo.codice.org/repository

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate Tag Exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag }}"
          echo "Checking if tag '$TAG' exists..."

          if ! gh api repos/${{ github.repository }}/git/refs/tags/${TAG} > /dev/null 2>&1; then
            echo "::error::Tag '$TAG' does not exist in this repository"
            exit 1
          fi

          echo "Tag '$TAG' exists"

      - name: Setup JDK ${{ inputs.jdkVersion }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.jdkVersion }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Checkout Tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}
          fetch-depth: 1

      - name: Create Maven Settings
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          mkdir -p ~/.m2
          printf '<settings>\n  <servers>\n    <server>\n      <id>releases</id>\n      <username>%s</username>\n      <password>%s</password>\n    </server>\n    <server>\n      <id>snapshots</id>\n      <username>%s</username>\n      <password>%s</password>\n    </server>\n  </servers>\n</settings>\n' "$NEXUS_USERNAME" "$NEXUS_PASSWORD" "$NEXUS_USERNAME" "$NEXUS_PASSWORD" > ~/.m2/settings.xml

      - name: Verify Version Matches Tag
        run: |
          POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          TAG="${{ inputs.tag }}"

          echo "POM version: $POM_VERSION"
          echo "Tag: $TAG"

          TAG_VERSION="${TAG##*-}"

          if [[ "$POM_VERSION" != "$TAG_VERSION" ]]; then
            echo "::warning::POM version ($POM_VERSION) doesn't match tag version ($TAG_VERSION)"
            echo "This might be expected for some tag naming conventions"
          fi

      - name: Maven Deploy
        run: |
          if [[ "${{ inputs.testRun }}" == "true" ]]; then
            echo "TEST RUN - Would execute:"
            echo "mvn deploy -B -Prelease -DskipStatic=true -DskipTests=true -DretryFailedDeploymentCount=10"
            echo ""
            echo "Validating build would work..."
            mvn validate -B -Prelease
          else
            echo "Deploying ${{ inputs.tag }} to Nexus..."
            mvn deploy -B -Prelease \
              -DskipStatic=true \
              -DskipTests=true \
              -DretryFailedDeploymentCount=10 \
              -Dreleases.repository.url="${NEXUS_URL}/maven-releases/" \
              -Dsnapshots.repository.url="${NEXUS_URL}/maven-snapshots/" \
              -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn
          fi

      - name: Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Re-deploy Summary

          | Setting | Value |
          |---------|-------|
          | Tag | ${{ inputs.tag }} |
          | JDK | ${{ inputs.jdkVersion }} |
          | Test Run | ${{ inputs.testRun }} |

          EOF

          if [[ "${{ inputs.testRun }}" == "true" ]]; then
            echo "**TEST RUN - No artifacts were deployed**" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Artifacts deployed to Nexus**" >> $GITHUB_STEP_SUMMARY
          fi
